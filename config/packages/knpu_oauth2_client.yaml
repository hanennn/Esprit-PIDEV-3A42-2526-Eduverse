knpu_oauth2_client:
    clients:
        # will be used as "google" key
        google:
            # must be "google" - it activates that type!
            type: google
            # add and configure client_id and client_secret in the env file
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            # a route name you'll create
            redirect_route: connect_google_check
            redirect_params: {}
            # whether to check CSRF token on callback url
            # recommended to be true for security
            # use_state: true
